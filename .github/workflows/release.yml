name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push release commits/tags
      pull-requests: write # open the version-bump PR
      id-token: write # npm provenance + crates.io trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 26

      # `changeset:version` rewrites Cargo manifests and refreshes Cargo.lock,
      # and the crate publish below builds; both need a toolchain.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: yarn install

      - id: changesets
        uses: changesets/action@v1
        with:
          version: yarn changeset:version
          publish: yarn changeset:publish

      # Short-lived token over OIDC; the trusted publisher for this repo and
      # workflow has to be registered on crates.io first.
      - uses: rust-lang/crates-io-auth-action@v1
        id: crates-auth
        if: steps.changesets.outputs.published == 'true'

      - name: Publish rkyv-js-codegen to crates.io
        if: steps.changesets.outputs.published == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}
        run: |
          version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "rkyv-js-codegen") | .version')

          # Re-running a finished release must not fail on "already uploaded".
          # The sparse index 404s for a crate that was never published, which
          # curl -sf turns into a non-zero exit, i.e. the else branch.
          if curl -sf https://index.crates.io/rk/yv/rkyv-js-codegen \
            | jq -e --arg v "$version" 'select(.vers == $v)' > /dev/null; then
            echo "rkyv-js-codegen@$version is already on crates.io"
          else
            echo "Publishing rkyv-js-codegen@$version"
            cargo publish -p rkyv-js-codegen --locked
          fi
